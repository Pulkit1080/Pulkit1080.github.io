    <line x1="10" y1="28" x2="130" y2="28" stroke="#e2e8f0"></line>
    <text x="10" y="42" fill="#475569" font-size="9">prod_id · brand</text>
    <text x="10" y="54" fill="#475569" font-size="9">therapy_area</text>
    <text x="10" y="64" fill="#475569" font-size="9">indication · sku</text>
  </g>
  <g transform="translate(60,360)">
