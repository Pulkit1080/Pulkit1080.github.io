<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, system-ui, sans-serif">
  <rect width="800" height="500" fill="#fafaf9"></rect>
  <text x="30" y="36" fill="#1f2937" font-size="14" font-weight="600">QlikView · Sales Performance — Star Schema</text>
  <text x="30" y="54" fill="#6b7280" font-size="10">15 dashboards · 1,000+ enhancements · ~50% faster validation via S3 + Athena intermediate tables</text>

  
  <g transform="translate(310,210)">
    <rect width="180" height="80" fill="#1f2937" stroke="#111827"></rect>
