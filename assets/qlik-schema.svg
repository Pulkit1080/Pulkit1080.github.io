    <line x1="14" y1="32" x2="166" y2="32" stroke="#374151"></line>
    <text x="14" y="46" fill="#9ca3af" font-size="9">date_id · prod_id</text>
    <text x="14" y="58" fill="#9ca3af" font-size="9">geo_id · cust_id · rep_id</text>
    <text x="14" y="70" fill="#fde68a" font-size="9">revenue · units · scripts</text>
  </g>

  
  <g transform="translate(60,80)">
    <rect width="140" height="68" fill="#fff" stroke="#cbd5e1"></rect>
