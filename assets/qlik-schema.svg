    <line x1="200" y1="394" x2="310" y2="270"></line>
    <line x1="600" y1="394" x2="490" y2="270"></line>
    <line x1="400" y1="108" x2="400" y2="210"></line>
    <line x1="400" y1="400" x2="400" y2="290" stroke="#fb923c" stroke-dasharray="4,3"></line>
