    <text x="10" y="54" fill="#475569" font-size="9">district · territory</text>
    <text x="10" y="64" fill="#475569" font-size="9">zip · hcp_zone</text>
  </g>
  <g transform="translate(600,360)">
    <rect width="140" height="68" fill="#fff" stroke="#cbd5e1"></rect>
    <text x="70" y="20" fill="#1e3a8a" font-size="10" font-weight="600" text-anchor="middle">DIM_REP</text>
    <line x1="10" y1="28" x2="130" y2="28" stroke="#e2e8f0"></line>
    <text x="10" y="42" fill="#475569" font-size="9">rep_id · name</text>
    <text x="10" y="54" fill="#475569" font-size="9">manager_id</text>
    <text x="10" y="64" fill="#475569" font-size="9">tenure · quota</text>
  </g>
  <g transform="translate(330,40)">
