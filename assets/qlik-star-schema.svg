              <rect x="1280" y="720" width="260" height="150" fill="#ffffff" stroke="#c084fc" stroke-width="1.5"></rect>
              <rect x="1280" y="720" width="260" height="30" fill="#f3e8ff"></rect>
              <text x="1410" y="740" font-size="13" font-weight="700" fill="#6b21a8" text-anchor="middle">BRIDGE_TEAM</text>
              <text x="1294" y="770" font-size="11" fill="#374151">rep_key</text><text x="1294" y="788" font-size="11" fill="#374151">team_id</text><text x="1294" y="806" font-size="11" fill="#374151">role</text><text x="1294" y="824" font-size="11" fill="#374151">effective_dt</text>
  
  <g transform="translate(60, 900)">
    <rect width="1480" height="64" fill="#111827"></rect>
    <text x="24" y="28" font-size="12" fill="#9ca3af">BEFORE</text>
    <text x="24" y="50" font-size="14" fill="#fca5a5">Synthetic keys across 12 loosely-joined tables · ~6 min reload · recurring circular-reference defects</text>
    <text x="780" y="28" font-size="12" fill="#9ca3af">AFTER</text>
    <text x="780" y="50" font-size="14" fill="#86efac">1 conformed fact + 7 dimensions · ~3 min reload · 50% faster SQL validation on Athena intermediate tables</text>
  </g>
</svg>