<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000" font-family="Inter, Helvetica, Arial, sans-serif">
  <rect width="1600" height="1000" fill="#fafaf7"></rect>
  <text x="60" y="60" font-size="22" font-weight="700" fill="#111827">QlikView Data Model — Sales &amp; Incentives Star Schema</text>
  <text x="60" y="86" font-size="13" fill="#6b7280">Restructured from legacy synthetic keys to conformed fact + 7 dimensions · reduced load time ~50%</text>
  
  <g>
    <rect x="640" y="420" width="320" height="200" fill="#1f2937" stroke="#111827"></rect>
    <text x="800" y="450" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">FACT_SALES_INCENTIVES</text>
    <line x1="660" y1="464" x2="940" y2="464" stroke="#374151"></line>
    <g font-size="12" fill="#d1d5db">
      <text x="660" y="488">PK  sale_id</text>
      <text x="660" y="508">FK  date_key</text>
      <text x="660" y="528">FK  hcp_key</text>
      <text x="660" y="548">FK  product_key</text>
      <text x="660" y="568">FK  geo_key</text>
      <text x="660" y="588">FK  channel_key</text>
      <text x="660" y="608">FK  rep_key · plan_key</text>
    </g>
    <text x="800" y="620" font-size="11" fill="#9ca3af" text-anchor="middle">measures: trx, nrx, units, gross_$, net_$</text>
  </g>
  
  <line x1="190" y1="195" x2="800" y2="520" stroke="#c084fc" stroke-width="1.5"></line>
              <rect x="60" y="120" width="260" height="150" fill="#ffffff" stroke="#c084fc" stroke-width="1.5"></rect>
